<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — BoatWraps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #0a0a0a;
      padding: 32px 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    h1 span { color: #39ff14; }

    p.sub {
      color: #6b7280;
      margin-bottom: 32px;
      font-size: 15px;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }

    .gallery-item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .gallery-item:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .gallery-item img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      .gallery-item img { height: 220px; }
    }

    .gallery-item .caption {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #111;
      border-top: 1px solid #e5e7eb;
      background: #fff;
      text-transform: capitalize;
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 999;
      padding: 24px;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox img {
      max-width: min(96vw, 1200px);
      max-height: 88vh;
      border-radius: 12px;
      display: block;
    }

    .lb-close {
      position: absolute;
      top: 16px;
      right: 18px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
    }

    .lb-close:hover { background: #39ff14; color: #000; }

    .no-images {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
      border: 2px dashed #e5e7eb;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <h1>Boat<span>Wraps</span> Gallery</h1>
  <p class="sub">Florida Boat Wraps That Turn Heads, Not Just Wakes.</p>

  <div class="gallery" id="gallery">
    <!-- populated by JS -->
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">&times;</button>
    <img id="lbImg" src="" alt="">
  </div>

  <script>
    // -------------------------------------------------------
    // List your image filenames here.
    // They will be displayed in order, two per row on desktop.
    // Dashes in filenames are automatically removed from titles.
    // -------------------------------------------------------
    const images = [
      BLACK-MARLIN-boatwraps.png,
Blue-Platinum-boatwrap-.png,
Finnn-boat-wrap-boa-twrap.png,
barrel-fever-boatwrap.png,
barrels.png,
big-sickles-boat-wrap.png,
billfish-boatwraps-.png,
bills-and-barrels-boatwrap.png,
bills-n-sickles-boatwraps.png,
black-betty.png,
black-ghost.png,
black-marlin-digital-boatwraps.png
black-n-blue-1.png
black-sea-banshees-boatwrap.png
blackout-trout.png
blackwater-wraiths.png
blue-ghost-boatwrap.png
blue-marlin-carbon-boatwraps.png
bluefin-camo-boat-wrap.png
bluefin-carbon-boatwraps.png
bluewater-boat-wrap.png
bluewater-carbon-boatwraps.png
broadbill-boatwraps.png
brochure-stock-billfish-camo.png
brochure-stock-blue-marlin-digital-blue-carbon.png
brochure-stock-bluemarlin-digital.png
brochure-stock-broad-fin-black.png
brochure-stock-camo-blls-tunas-n-snappa.png
caarbon-skirt-chasers-boatwraps.png
carbon-mayhem-boat-wrap.png
digital-psychotics-boat-wrap.png
digital-sail-boat-wrap.png
electric-blue-boat-wrap.png
engraved-blue-marlin-boatwrap.png
grander-boat-wrap.png
green-and-gold-4.png
in-the-spread.png
mahimahi-boatwraps.png
mako-boatwraps.png
mako-digital-boatwraps.png
offshore-mayhem-boatwraps.png
offshore-psychodelics-boatwrap.png
pelagics-2-boat-wrap.png
pelagics-boatwraps-.png
reap-the-deep.png
red-sea-ballistics.png
release-the-beast-boat-wrap.png
release-the-kraken-boatwrap.png
sailfish-boatwraps.png
saltwater-carbon-red-boat-wrap.png
southern-bluefin-boatwraps.png
the-surge-boatwrap.png
wahoo-boatwraps.png
white-knights-broadbill-swordfish-boatwrap.png
white-out-boatwrap.png
white-platinum-boat-wrap.png
yellowfin-digital-boatwraps.png
    ];

    function fileToTitle(filename) {
      // Strip extension, replace dashes/underscores with spaces, capitalise each word
      return filename
        .replace(/\.[^/.]+$/, '')   // remove extension
        .replace(/[-_]+/g, ' ')     // dashes/underscores → spaces
        .replace(/\b\w/g, c => c.toUpperCase()); // Title Case
    }

    const gallery = document.getElementById('gallery');

    if (images.length === 0) {
      gallery.innerHTML = '<div class="no-images"><strong>No images yet.</strong><br>Add filenames to the <code>images</code> array in this file.</div>';
    } else {
      images.forEach(function(filename) {
        const item = document.createElement('div');
        item.className = 'gallery-item';

        const img = document.createElement('img');
        img.src = filename;
        img.alt = fileToTitle(filename);
        img.loading = 'lazy';
        img.addEventListener('click', function() { openLightbox(filename); });

        const caption = document.createElement('div');
        caption.className = 'caption';
        caption.textContent = fileToTitle(filename);

        item.appendChild(img);
        item.appendChild(caption);
        gallery.appendChild(item);
      });
    }

    // Lightbox
    const lb     = document.getElementById('lightbox');
    const lbImg  = document.getElementById('lbImg');
    const lbClose = document.getElementById('lbClose');

    function openLightbox(src) {
      lbImg.src = src;
      lb.classList.add('open');
    }

    lbClose.addEventListener('click', function() { lb.classList.remove('open'); });
    lb.addEventListener('click', function(e) { if (e.target === lb) lb.classList.remove('open'); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') lb.classList.remove('open'); });
  </script>

</body>
</html>
