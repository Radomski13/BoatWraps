<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inshore & Reef Designs — BoatWraps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #0a0a0a;
      padding: 32px 24px;
    }

    h1 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
    h1 span { color: #39ff14; }

    p.sub { color: #6b7280; margin-bottom: 32px; font-size: 15px; }

    .gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 600px) {
      .gallery { grid-template-columns: 1fr; }
    }

    .gallery-item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .gallery-item:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .gallery-item img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      .gallery-item img { height: 220px; }
    }

    .caption {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #111;
      border-top: 1px solid #e5e7eb;
      background: #fff;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 999;
      padding: 24px;
    }

    .lightbox.open { opacity: 1; pointer-events: auto; }

    .lightbox img {
      max-width: min(96vw, 1200px);
      max-height: 88vh;
      border-radius: 12px;
      display: block;
    }

    .lb-close {
      position: absolute;
      top: 16px; right: 18px;
      background: #000; color: #fff;
      border: none; border-radius: 10px;
      padding: 8px 14px; font-size: 26px;
      line-height: 1; cursor: pointer;
    }

    .lb-close:hover { background: #39ff14; color: #000; }
  </style>
</head>
<body>

  <h1>Boat<span>Wraps</span> Designs</h1>
  <p class="sub">Florida Boat Wraps That Turn Heads, Not Just Wakes.</p>

  <div class="gallery" id="gallery"></div>

  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">&times;</button>
    <img id="lbImg" src="" alt="">
  </div>

  <script>
    const images = [
      "camo-snapper-boat-wrap.png",
      "carbon-king-boatwraps.png",
      "carbon-kraken-boat-wrap.png",
      "coral-trout-wrap-1.png",
      "digital-permit-boatwraps.png",
      "double-trouble-boatwrap.png",
      "flathead-boatwraps.png",
      "greenback-boatwraps.png",
      "gt-boatwraps.png",
      "inshore-animals-boat-wrap.png",
      "inshore-pitching-boatwraps.png",
      "king-red-boatwrap.png",
      "kingfish-boatwraps.png",
      "kingfish-digital-boatwraps.png",
      "oldschool-kings-boatwrap.png",
      "permit-boatwraps.png",
      "red-metal.png",
      "reef-razors-boatwraps.png",
      "salty-barra-boatwraps.png",
      "shallow-water-suckers-boat-wrap.png",
      "shallowater-snapper-boatwraps.png",
      "snapper-boatwraps.png",
      "snapper-digital-colour-boatwraps.png",
      "squid-boatwraps.png",
      "squid-egi-boatwraps.png",
      "stickbait-slayers-boatwrap.png",
      "the-black-kings-boatwraps.png",
      "the-emperor-boat-wrap.png",
      "the-kings-boatwraps.png",
      "the-slashers-boatwrap.png",
      "tidal-jewels-boatwraps.png",
      "ting.png",
      "topwater-pit-bull-boat-wrap.png",
      "triple-threat-boatwraps.png",
      "walking-the-dogs-boatwraps.png",
      "yellow-fever-1.png",
      "beasts-n-bait-boat-wrap.jpg",
      "snapper-digital-boatwraps-.jpg",
      "snappn-blues-boat-wrap.jpg",
    ];

    function fileToTitle(filename) {
      return filename
        .replace(/\.[^/.]+$/, '')
        .replace(/[-_]+/g, ' ')
        .replace(/\b(boatwraps?|boatwrap|boat wrap)\b/gi, '')
        .replace(/\s*\d+\s*$/, '')
        .replace(/\s{2,}/g, ' ')
        .trim()
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    const gallery = document.getElementById('gallery');

    images.forEach(function(filename) {
      const item = document.createElement('div');
      item.className = 'gallery-item';

      const img = document.createElement('img');
      img.src = filename;
      img.alt = fileToTitle(filename);
      img.loading = 'lazy';
      img.addEventListener('click', function() { openLightbox(filename); });

      const caption = document.createElement('div');
      caption.className = 'caption';
      caption.textContent = fileToTitle(filename);

      item.appendChild(img);
      item.appendChild(caption);
      gallery.appendChild(item);
    });

    const lb      = document.getElementById('lightbox');
    const lbImg   = document.getElementById('lbImg');
    const lbClose = document.getElementById('lbClose');

    function openLightbox(src) {
      lbImg.src = src;
      lb.classList.add('open');
    }

    lbClose.addEventListener('click', function() { lb.classList.remove('open'); });
    lb.addEventListener('click', function(e) { if (e.target === lb) lb.classList.remove('open'); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') lb.classList.remove('open'); });
  </script>

</body>
</html>
