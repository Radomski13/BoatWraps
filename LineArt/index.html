<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Line Art Designs — BoatWraps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #0a0a0a;
      padding: 32px 24px;
    }

    h1 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
    h1 span { color: #39ff14; }

    p.sub { color: #6b7280; margin-bottom: 32px; font-size: 15px; }

    .gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 600px) {
      .gallery { grid-template-columns: 1fr; }
    }

    .gallery-item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }

    .gallery-item:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .gallery-item img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      .gallery-item img { height: 220px; }
    }

    .caption {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #111;
      border-top: 1px solid #e5e7eb;
      background: #fff;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 999;
      padding: 24px;
    }

    .lightbox.open { opacity: 1; pointer-events: auto; }

    .lightbox img {
      max-width: min(96vw, 1200px);
      max-height: 88vh;
      border-radius: 12px;
      display: block;
    }

    .lb-close {
      position: absolute;
      top: 16px; right: 18px;
      background: #000; color: #fff;
      border: none; border-radius: 10px;
      padding: 8px 14px; font-size: 26px;
      line-height: 1; cursor: pointer;
    }

    .lb-close:hover { background: #39ff14; color: #000; }
  </style>
</head>
<body>

  <h1>Boat<span>Wraps</span> Designs</h1>
  <p class="sub">Florida Boat Wraps That Turn Heads, Not Just Wakes.</p>

  <div class="gallery" id="gallery"></div>

  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">&times;</button>
    <img id="lbImg" src="" alt="">
  </div>

  <script>
    const images = [
      "GT-line-art-camo-boatwraps-01.jpg",
      "GT-line-art-lagoon-boatwraps-01.jpg",
      "GT-line-art-navy-boatwraps-01.jpg",
      "barramundi-line-art-blue-boatwraps-.jpg",
      "barramundi-line-art-green-boatwraps-01.jpg",
      "barramundi-line-art-white-boatwraps-01.jpg",
      "download.jpg",
      "download-1.jpg",
      "download-2.jpg",
      "download-3.jpg",
      "download-4.jpg",
      "download-5.jpg",
      "download-6.jpg",
      "download-7.jpg",
      "download-8.jpg",
      "download-9.jpg",
      "download-10.jpg",
      "download-11.jpg",
      "download-12.jpg",
      "download-13.jpg",
      "download-14.jpg",
      "king-fish-line-art-sand-boatwraps-01.jpg",
      "king-fish-line-art-white-boatwraps-01.jpg",
      "muddie-line-art-green-boatwraps-01.jpg",
      "muddie-line-art-white-boatwraps-01.jpg",
    ];

    // For "download-N" files we show a numbered label instead of just "Download"
    function fileToTitle(filename) {
      const base = filename.replace(/\.[^/.]+$/, '');

      // Handle plain download / download-N filenames
      if (/^download(-\d+)?$/.test(base)) {
        const match = base.match(/-(\d+)$/);
        return match ? 'Design ' + (parseInt(match[1]) + 1) : 'Design 1';
      }

      return base
        .replace(/[-_]+/g, ' ')
        .replace(/\b(boatwraps?|boatwrap|boat wrap)\b/gi, '')
        .replace(/\bline art\b/gi, 'Line Art')
        .replace(/\s*0*1\s*$/, '')        // strip trailing "01"
        .replace(/\s{2,}/g, ' ')
        .trim()
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    const gallery = document.getElementById('gallery');

    images.forEach(function(filename) {
      const item = document.createElement('div');
      item.className = 'gallery-item';

      const img = document.createElement('img');
      img.src = filename;
      img.alt = fileToTitle(filename);
      img.loading = 'lazy';
      img.addEventListener('click', function() { openLightbox(filename); });

      const caption = document.createElement('div');
      caption.className = 'caption';
      caption.textContent = fileToTitle(filename);

      item.appendChild(img);
      item.appendChild(caption);
      gallery.appendChild(item);
    });

    const lb      = document.getElementById('lightbox');
    const lbImg   = document.getElementById('lbImg');
    const lbClose = document.getElementById('lbClose');

    function openLightbox(src) {
      lbImg.src = src;
      lb.classList.add('open');
    }

    lbClose.addEventListener('click', function() { lb.classList.remove('open'); });
    lb.addEventListener('click', function(e) { if (e.target === lb) lb.classList.remove('open'); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') lb.classList.remove('open'); });
  </script>

</body>
</html>
