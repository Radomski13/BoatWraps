<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florida Boat Wraps That Turn Heads, <em>Not Just Wakes.</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    #estimateFrame{
      width:100%; height:720px;
      border:0; display:block; overflow:hidden;
    }
    @media (max-width:1200px){ #estimateFrame{ height:760px !important; } }
    @media (max-width:900px){  #estimateFrame{ height:820px !important; } }
    @media (max-width:600px){  #estimateFrame{ height:900px !important; } }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <span class="logo" style="font-size:22px;font-weight:900;letter-spacing:-0.5px;">Boat Wraps</span>
    <p>Servicing Tampa, Clearwater & St Petersburg</p>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="gallery.html">Gallery</a>
      <a href="faq.html">FAQ</a>
    </nav>
    <a class="cta" href="contact.html">Get a quote</a>
  </div>
</header>

<main class="section">
  <section class="hero">
    <h1>Florida Boat Wraps That Turn Heads, <em>Not Just Wakes.</em></h1>
    <p class="lead">We don't just make boats seen — we set the standard for how brands command the water.</p>
    <p>
      <a class="cta" href="contact.html">Start with an estimate</a>
      <a class="cta ghost" href="gallery.html" style="background:transparent;border:2px solid #000;color:#000;margin-left:10px;">See recent installs</a>
    </p>
  </section>

  <section class="estimate-wrap">
    <iframe id="estimateFrame" src="boatwraps_price_slider_estimate.html" scrolling="no"></iframe>
  </section>
</main>

<footer class="footer">
  © <script>document.write(new Date().getFullYear())</script> BoatWraps
</footer>

<script>
(function () {
  var path = (location.pathname.split('/').pop() || 'index.html')
    .split('?')[0].split('#')[0].toLowerCase();
  document.querySelectorAll('.nav a').forEach(function (a) {
    var href = (a.getAttribute('href') || '').split('?')[0].split('#')[0].toLowerCase();
    if (href === path || (path === '' && href === 'index.html')) {
      a.classList.add('active');
    }
  });
  if (path === 'contact.html') {
    var cta = document.querySelector('.cta');
    if (cta) cta.classList.add('active');
  }
})();
</script>
</body>
</html>
